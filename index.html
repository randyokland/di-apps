<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebStore & My Portofolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#10b981',
                        dark: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar untuk editor */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c5c5c5; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 1. KONFIGURASI KUNCI MASTER PEMULIHAN ADMIN ---
        const RECOVERY_MASTER_KEY = "admin123";

        // --- 2. PASTE CONFIG FIREBASE ANDA DI SINI UNTUK DEPLOY MANDIRI ---
        // Jika Anda mempublish ke GitHub Pages / Vercel, ganti null dengan config dari konsol Firebase Anda:
        // const MY_FIREBASE_CONFIG = { apiKey: "...", authDomain: "...", projectId: "...", ... };
        const MY_FIREBASE_CONFIG = {
  apiKey: "AIzaSyC7_kfqIm8OTzwqgnCzFSpfjYMETFtwDEU",
  authDomain: "difam-5c124.firebaseapp.com",
  projectId: "difam-5c124",
  storageBucket: "difam-5c124.firebasestorage.app",
  messagingSenderId: "41833181587",
  appId: "1:41833181587:web:6492096dd7e21ae581f866"
};

        // --- DATA AWAL SEBAGAI FALLBACK (Jika Cloud Kosong) ---
        const initialProfile = {
            name: "Budi Developer",
            title: "Fullstack Web Developer",
            bio: "Saya adalah pengembang web independen yang berfokus pada pembuatan aplikasi web ringan, cepat, dan responsif (Single File HTML). Saya memiliki pengalaman lebih dari 5 tahun dalam dunia web development.",
            skills: "HTML, CSS, JavaScript, React, Tailwind",
            email: "di-fam.dev@example.com",
            waNumber: "6289695567267" 
        };

        const sampleHtmlApp = `<!DOCTYPE html>
<html>
<head>
    <title>Demo App</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #e0f2fe; color: #0284c7; }
        button { padding: 10px 20px; background: #0ea5e9; color: white; border: none; border-radius: 5px; cursor: pointer;}
        button:hover { background: #0284c7; }
    </style>
</head>
<body>
    <h1>Aplikasi Kasir Sederhana (Demo)</h1>
    <p>Ini adalah contoh aplikasi web 1 file.</p>
    <button onclick="alert('Tombol ditekan!')">Coba Fitur</button>
</body>
</html>`;

        const initialProducts = [
            {
                id: Date.now(),
                title: "Aplikasi Kasir Mini HTML",
                description: "Aplikasi kasir ringan tanpa database, cocok untuk warung kecil. Sepenuhnya berjalan di browser.",
                price: "150000",
                code: sampleHtmlApp
            }
        ];

        // --- KOMPONEN UTAMA ---
        function App() {
            // State Aplikasi
            const [view, setView] = useState('home'); 
            const [loading, setLoading] = useState(true);
            
            // State Cloud Database
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const [dbInitError, setDbInitError] = useState('');
            
            // State Data
            const [profile, setProfile] = useState(initialProfile);
            const [products, setProducts] = useState([]);
            const [activeProduct, setActiveProduct] = useState(null);

            // State Pemulihan Rahasia & Dialog Kustom
            const [claimCount, setClaimCount] = useState(0);
            const [showClaimModal, setShowClaimModal] = useState(false);
            const [claimInput, setClaimInput] = useState('');
            const [claimStatus, setClaimStatus] = useState({ error: '', success: '' });
            const [customAlert, setCustomAlert] = useState(null); // { message, isConfirm, onConfirm }

            // Cek apakah user saat ini adalah Pemilik (Owner)
            const isOwner = user && profile && profile.ownerUid === user.uid;

            // Trigger Dialog Kustom
            const triggerAlert = (message, isConfirm = false, onConfirm = null) => {
                setCustomAlert({ message, isConfirm, onConfirm });
            };

            // Inisialisasi Firebase & Autentikasi
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        let firebaseConfig = null;

                        // Gunakan config dari environment Canvas, jika tidak ada cari dari variabel lokal MY_FIREBASE_CONFIG
                        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                            firebaseConfig = JSON.parse(__firebase_config);
                        } else if (MY_FIREBASE_CONFIG && MY_FIREBASE_CONFIG.apiKey) {
                            firebaseConfig = MY_FIREBASE_CONFIG;
                        }

                        if (!firebaseConfig || !firebaseConfig.apiKey) {
                            throw new Error("Konfigurasi Firebase tidak ditemukan. Silakan tambahkan kredensial Firebase Anda ke variabel 'MY_FIREBASE_CONFIG' di baris ke-39 kode HTML.");
                        }

                        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
                        const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
                        const { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');

                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        
                        setFb({ db, appId, collection, doc, setDoc, deleteDoc, onSnapshot });

                        // Autentikasi sesuai aturan
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (u) => {
                            setUser(u);
                        });
                    } catch (err) {
                        console.error("Firebase init error:", err);
                        setDbInitError(err.message);
                        setLoading(false); // Matikan loading agar tetap bisa memakai fallback offline mode
                    }
                };
                initFirebase();
            }, []);

            // Ambil Data dari Firestore
            useEffect(() => {
                if (!user || !fb) {
                    // Jika Firebase tidak terkonfigurasi, gunakan data lokal dummy agar web tetap tampil indah
                    if (dbInitError) {
                        setProducts(initialProducts);
                        setLoading(false);
                    }
                    return;
                }
                const { db, appId, collection, doc, setDoc, onSnapshot } = fb;

                let profileReady = false;
                let productsReady = false;

                const checkReady = () => {
                    if(profileReady && productsReady) setLoading(false);
                }

                // Listener Profil (Public Data)
                const unsubProfile = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'profileData'),
                    (snapshot) => {
                        if (snapshot.empty) {
                            // Seed data jika Cloud Kosong, DAN tetapkan user pertama sebagai Owner
                            const newProfile = { ...initialProfile, ownerUid: user.uid };
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profileData', 'main'), newProfile);
                        } else {
                            const data = snapshot.docs[0].data();
                            // Jika data lama belum ada ownerUid, auto-klaim oleh user ini (Migrasi)
                            if (!data.ownerUid) {
                                const updatedData = { ...data, ownerUid: user.uid };
                                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profileData', 'main'), updatedData);
                            } else {
                                setProfile(data);
                            }
                        }
                        profileReady = true; checkReady();
                    },
                    (error) => { console.error("Profile sync error:", error); profileReady = true; checkReady(); }
                );

                // Listener Produk (Public Data)
                const unsubProducts = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'productsData'),
                    (snapshot) => {
                        if (snapshot.empty) {
                            // Seed data produk pertama kali
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productsData', initialProducts[0].id.toString()), initialProducts[0]);
                        } else {
                            const prods = [];
                            snapshot.forEach(d => prods.push(d.data()));
                            setProducts(prods);
                        }
                        productsReady = true; checkReady();
                    },
                    (error) => { console.error("Products sync error:", error); productsReady = true; checkReady(); }
                );

                return () => {
                    unsubProfile();
                    unsubProducts();
                };
            }, [user, fb, dbInitError]);

            // Fungsi Simpan ke Cloud (Dioper ke AdminDashboard)
            const saveProfileToCloud = async (newProfile) => {
                if(!fb) return;
                const { db, appId, doc, setDoc } = fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profileData', 'main'), newProfile);
            };

            const saveProductToCloud = async (prod) => {
                if(!fb) return;
                const { db, appId, doc, setDoc } = fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productsData', prod.id.toString()), prod);
            };

            const deleteProductFromCloud = async (prodId) => {
                if(!fb) return;
                const { db, appId, doc, deleteDoc } = fb;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productsData', prodId.toString()));
            };

            // Klaim Kepemilikan melalui Master Key
            const handleClaimOwnership = async (e) => {
                e.preventDefault();
                setClaimStatus({ error: '', success: '' });
                
                if (claimInput === RECOVERY_MASTER_KEY) {
                    try {
                        if (dbInitError) {
                            throw new Error(`Koneksi database tidak aktif:\n${dbInitError}`);
                        }
                        if (!fb || !user) {
                            throw new Error("Layanan Firebase sedang melakukan sinkronisasi latar belakang. Tunggu 3 detik dan coba lagi.");
                        }
                        const { db, appId, doc, setDoc } = fb;
                        
                        const updatedProfile = { ...profile, ownerUid: user.uid };
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profileData', 'main'), updatedProfile);
                        
                        setProfile(updatedProfile);
                        setClaimStatus({ error: '', success: 'Klaim Berhasil! Anda sekarang terdaftar sebagai Pemilik resmi.' });
                        setTimeout(() => {
                            setShowClaimModal(false);
                            setClaimCount(0);
                            setClaimInput('');
                            setClaimStatus({ error: '', success: '' });
                            setView('admin'); // Masuk langsung ke Admin
                        }, 1500);
                    } catch (err) {
                        setClaimStatus({ error: err.message, success: '' });
                    }
                } else {
                    setClaimStatus({ error: 'Kunci Pemulihan Salah!', success: '' });
                }
            };

            // Handler Deteksi Klik Rahasia
            const handleSecretClick = () => {
                const nextCount = claimCount + 1;
                setClaimCount(nextCount);
                if (nextCount >= 5) {
                    setShowClaimModal(true);
                    setClaimCount(0);
                }
            };

            // Navigasi
            const navigate = (page, product = null) => {
                setView(page);
                if (product) setActiveProduct(product);
            };

            // Format Mata Uang
            const formatRupiah = (angka) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(angka);
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50">
                        <div className="text-center p-6">
                            <i className="fa-solid fa-cloud-arrow-down fa-bounce text-5xl text-primary mb-4"></i>
                            <h2 className="text-xl font-bold text-gray-700">Menyinkronkan Data Cloud...</h2>
                            <p className="text-sm text-gray-500 mt-2">Menghubungkan ke layanan penyimpanan aman</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* BANNER NOTIFIKASI JIKA DATABASE OFFLINE */}
                    {dbInitError && (
                        <div className="bg-yellow-500 text-white text-xs py-2 px-4 text-center font-semibold flex items-center justify-center gap-2">
                            <i className="fa-solid fa-triangle-exclamation"></i>
                            <span>Aplikasi berjalan dalam Mode Demonstrasi Lokal (Offline). Fitur penyimpanan Cloud dinonaktifkan hingga Anda menyetel Firebase Config.</span>
                        </div>
                    )}

                    {/* NAVBAR */}
                    <nav className="bg-white shadow-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16">
                                <div className="flex items-center">
                                    <span className="text-xl font-bold text-primary cursor-pointer" onClick={() => navigate('home')}>
                                        <i className="fa-solid fa-code border-2 border-primary rounded-md p-1 mr-2"></i>
                                        {profile.name} Portofolio
                                    </span>
                                </div>
                                <div className="flex items-center space-x-2 md:space-x-4">
                                    <button onClick={() => navigate('home')} className={`px-3 py-2 rounded-md text-sm font-medium ${view === 'home' ? 'text-primary bg-indigo-50' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}`}>
                                        <i className="fa-solid fa-store md:mr-2"></i><span className="hidden md:inline">Produk</span>
                                    </button>
                                    <button onClick={() => navigate('cv')} className={`px-3 py-2 rounded-md text-sm font-medium ${view === 'cv' ? 'text-primary bg-indigo-50' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}`}>
                                        <i className="fa-solid fa-user-tie md:mr-2"></i><span className="hidden md:inline">Profil CV</span>
                                    </button>
                                    
                                    {/* HANYA TAMPIL JIKA USER ADALAH PEMILIK (OWNER) */}
                                    {isOwner && (
                                        <button onClick={() => navigate('admin')} className={`px-3 py-2 rounded-md text-sm font-medium ${view === 'admin' ? 'bg-dark text-white' : 'text-gray-600 hover:text-dark hover:bg-gray-100'}`}>
                                            <i className="fa-solid fa-shield-check md:mr-2 text-green-400"></i><span className="hidden md:inline">Panel Admin</span>
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* AREA KONTEN UTAMA */}
                    <main className="flex-grow">
                        {view === 'home' && <PublicHome products={products} onSelectProduct={(p) => navigate('productDetail', p)} formatRupiah={formatRupiah} />}
                        {view === 'cv' && <ProfileView profile={profile} />}
                        {view === 'productDetail' && <ProductDetail product={activeProduct} onBack={() => navigate('home')} waNumber={profile.waNumber} formatRupiah={formatRupiah} />}
                        
                        {/* Halaman Admin dilindungi dengan pengecekan isOwner */}
                        {view === 'admin' && isOwner && (
                            <AdminDashboard 
                                products={products} 
                                profile={profile} 
                                onSaveProfile={saveProfileToCloud}
                                onSaveProduct={saveProductToCloud}
                                onDeleteProduct={deleteProductFromCloud}
                                onLogout={() => navigate('home')}
                                triggerAlert={triggerAlert}
                            />
                        )}
                        
                        {/* Fallback jika bukan owner tapi mencoba akses URL/view admin */}
                        {view === 'admin' && !isOwner && (
                            <div className="text-center py-20 text-red-500 font-bold text-xl">
                                <i className="fa-solid fa-triangle-exclamation text-4xl mb-3 block"></i>
                                Akses Panel Ditolak
                            </div>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-dark text-white text-center py-6 mt-auto">
                        <p>&copy; {new Date().getFullYear()} {profile.name}. Hak Cipta Dilindungi.</p>
                        <p className="text-gray-400 text-sm mt-2 flex justify-center items-center gap-2">
                            <span>Dibuat sebagai Single-File HTML WebApp</span>
                            <span>•</span>
                            <span 
                                onClick={handleSecretClick} 
                                className={`cursor-pointer hover:underline select-none flex items-center gap-1 ${dbInitError ? 'text-yellow-400' : 'text-green-400'}`}
                                title="Klik 5 kali untuk Pemulihan Admin"
                            >
                                <i className={`fa-solid ${dbInitError ? 'fa-cloud-slash' : 'fa-cloud'}`}></i> {dbInitError ? 'Local Mode Active' : 'Cloud Sync Active'}
                            </span>
                        </p>
                    </footer>

                    {/* --- MODAL DIALOG KUSTOM (PENGGANTI ALERT/CONFIRM) --- */}
                    {customAlert && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50">
                            <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full border border-gray-100 animate-fadeIn">
                                <h3 className="text-lg font-bold text-gray-900 mb-3 flex items-center">
                                    <i className="fa-solid fa-circle-info text-primary mr-2 text-xl"></i> Informasi
                                </h3>
                                <p className="text-gray-600 text-sm mb-6 whitespace-pre-line">{customAlert.message}</p>
                                <div className="flex justify-end gap-3">
                                    {customAlert.isConfirm && (
                                        <button 
                                            onClick={() => { customAlert.onConfirm && customAlert.onConfirm(); setCustomAlert(null); }}
                                            className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-semibold transition"
                                        >
                                            Ya, Lanjutkan
                                        </button>
                                    )}
                                    <button 
                                        onClick={() => setCustomAlert(null)}
                                        className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-semibold transition"
                                    >
                                        {customAlert.isConfirm ? 'Batal' : 'Tutup'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL KLAIM KEPEMILIKAN RAHASIA --- */}
                    {showClaimModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-70">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full border border-gray-100 shadow-2xl">
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-indigo-50 text-primary rounded-full flex items-center justify-center mx-auto mb-4">
                                        <i className="fa-solid fa-key text-3xl"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-gray-950">Pemulihan Hak Akses Admin</h3>
                                    <p className="text-sm text-gray-500 mt-1">Masukkan Kunci Master untuk mendaftarkan perangkat Anda saat ini sebagai Pemilik Resmi Portofolio.</p>
                                </div>
                                
                                <form onSubmit={handleClaimOwnership} className="space-y-4">
                                    <div>
                                        <input 
                                            type="password"
                                            placeholder="Masukkan Kunci Master Pemulihan"
                                            className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none text-center tracking-widest"
                                            value={claimInput}
                                            onChange={(e) => setClaimInput(e.target.value)}
                                            required
                                            autoFocus
                                        />
                                    </div>

                                    {claimStatus.error && (
                                        <div className="text-red-500 text-xs font-medium bg-red-50 p-3 rounded-lg border border-red-200 text-left space-y-1">
                                            <p className="font-bold"><i className="fa-solid fa-circle-exclamation mr-1"></i> Gagal Memproses:</p>
                                            <p className="whitespace-pre-line text-[11px] leading-relaxed">{claimStatus.error}</p>
                                        </div>
                                    )}
                                    {claimStatus.success && (
                                        <p className="text-green-600 text-xs text-center font-medium bg-green-50 p-2 rounded-lg border border-green-200 animate-pulse">
                                            <i className="fa-solid fa-circle-check mr-1"></i> {claimStatus.success}
                                        </p>
                                    )}

                                    <div className="flex gap-3">
                                        <button 
                                            type="submit"
                                            className="flex-grow bg-primary hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition"
                                        >
                                            Klaim Pemilik
                                        </button>
                                        <button 
                                            type="button"
                                            onClick={() => { setShowClaimModal(false); setClaimInput(''); setClaimStatus({error:'', success:''}); }}
                                            className="px-5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition"
                                        >
                                            Batal
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- TAMPILAN PUBLIK: HOME (Daftar Produk) ---
        function PublicHome({ products, onSelectProduct, formatRupiah }) {
            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
                    <div className="text-center mb-12">
                        <h1 className="text-3xl md:text-5xl font-extrabold text-gray-900 mb-4">Solusi Web App <span className="text-primary">Sekali Klik</span></h1>
                        <p className="text-lg text-gray-600 max-w-2xl mx-auto">Kami menyediakan berbagai aplikasi web praktis berbasis single-file HTML. Ringan, cepat, dan siap pakai tanpa perlu setting server yang rumit.</p>
                    </div>

                    {products.length === 0 ? (
                        <div className="text-center text-gray-500 py-10">Belum ada produk yang ditampilkan.</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {products.map(product => (
                                <div key={product.id} className="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100 hover:shadow-xl transition duration-300 flex flex-col">
                                    <div className="h-48 bg-gray-100 relative group overflow-hidden">
                                        {/* Mockup Thumbnail Cepat */}
                                        <div className="absolute inset-0 flex items-center justify-center bg-gradient-to-br from-indigo-100 to-blue-50 text-indigo-300">
                                            <i className="fa-solid fa-laptop-code text-6xl"></i>
                                        </div>
                                        <div className="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition duration-300 flex items-center justify-center">
                                            <button onClick={() => onSelectProduct(product)} className="opacity-0 group-hover:opacity-100 bg-white text-primary font-bold py-2 px-6 rounded-full transform translate-y-4 group-hover:translate-y-0 transition duration-300 shadow-lg">
                                                Lihat Demo
                                            </button>
                                        </div>
                                    </div>
                                    <div className="p-6 flex-grow flex flex-col">
                                        <h3 className="text-xl font-bold text-gray-900 mb-2">{product.title}</h3>
                                        <p className="text-gray-600 text-sm mb-4 flex-grow line-clamp-3">{product.description}</p>
                                        <div className="flex items-center justify-between mt-auto pt-4 border-t border-gray-100">
                                            <span className="text-lg font-bold text-secondary">{formatRupiah(product.price)}</span>
                                            <button onClick={() => onSelectProduct(product)} className="text-primary font-medium hover:text-indigo-800 text-sm flex items-center">
                                                Detail <i className="fa-solid fa-arrow-right ml-1"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // --- TAMPILAN PUBLIK: DETAIL & DEMO PRODUK ---
        function ProductDetail({ product, onBack, waNumber, formatRupiah }) {
            const waMessage = encodeURIComponent(`Halo, saya tertarik dengan produk web app: *${product.title}*. Bisa minta info lebih lanjut?`);
            const waLink = `https://wa.me/${waNumber}?text=${waMessage}`;

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                    <button onClick={onBack} className="text-gray-500 hover:text-primary mb-6 flex items-center">
                        <i className="fa-solid fa-arrow-left mr-2"></i> Kembali ke Katalog
                    </button>

                    <div className="bg-white rounded-xl shadow-xl overflow-hidden flex flex-col lg:flex-row border border-gray-100 h-[80vh]">
                        {/* Area Info (Desktop Kiri, Mobile Atas) */}
                        <div className="w-full lg:w-1/3 p-6 lg:p-8 bg-gray-50 border-b lg:border-b-0 lg:border-r border-gray-200 flex flex-col overflow-y-auto">
                            <h2 className="text-2xl lg:text-3xl font-bold text-gray-900 mb-2">{product.title}</h2>
                            <div className="text-2xl font-black text-secondary mb-6">{formatRupiah(product.price)}</div>
                            
                            <h4 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">Deskripsi Produk</h4>
                            <p className="text-gray-700 mb-8 whitespace-pre-wrap flex-grow">{product.description}</p>
                            
                            <div className="mt-auto pt-6">
                                <a href={waLink} target="_blank" rel="noopener noreferrer" className="w-full block text-center bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-200 flex items-center justify-center">
                                    <i className="fa-brands fa-whatsapp text-xl mr-2"></i> Beli via WhatsApp
                                </a>
                                <p className="text-xs text-gray-400 text-center mt-3">
                                    <i className="fa-solid fa-shield-halved mr-1"></i> Transaksi aman langsung dengan kreator
                                </p>
                            </div>
                        </div>
                        
                        {/* Area Demo Iframe (Desktop Kanan, Mobile Bawah) */}
                        <div className="w-full lg:w-2/3 h-[50vh] lg:h-full bg-white relative">
                            <div className="absolute top-0 left-0 right-0 bg-gray-800 text-gray-300 text-xs py-2 px-4 flex justify-between items-center z-10">
                                <span><i className="fa-solid fa-desktop mr-2"></i> Live Preview</span>
                                <span className="text-gray-500">Berjalan di Sandbox</span>
                            </div>
                            <iframe 
                                srcDoc={product.code} 
                                className="w-full h-full border-0 pt-8"
                                sandbox="allow-scripts allow-same-origin allow-forms"
                                title="Product Demo"
                            ></iframe>
                        </div>
                    </div>
                </div>
            );
        }

        // --- TAMPILAN PUBLIK: PROFIL / CV ---
        function ProfileView({ profile }) {
            return (
                <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                    <div className="bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
                        <div className="bg-primary h-32 md:h-48"></div>
                        <div className="px-6 md:px-12 pb-10 flex flex-col items-center -mt-16 md:-mt-24">
                            <div className="w-32 h-32 md:w-48 md:h-48 bg-white rounded-full p-2 shadow-lg mb-6 flex items-center justify-center text-primary bg-gray-50 border-4 border-white">
                                <i className="fa-solid fa-user-astronaut text-6xl md:text-8xl"></i>
                            </div>
                            <h1 className="text-3xl md:text-4xl font-bold text-gray-900 text-center">{profile.name}</h1>
                            <p className="text-lg md:text-xl text-primary font-medium mt-2">{profile.title}</p>
                            
                            <div className="flex gap-4 mt-6">
                                <a href={`mailto:${profile.email}`} className="bg-gray-100 hover:bg-gray-200 text-gray-700 p-3 rounded-full transition"><i className="fa-solid fa-envelope"></i></a>
                                <a href={`https://wa.me/${profile.waNumber}`} target="_blank" className="bg-green-100 hover:bg-green-200 text-green-700 p-3 rounded-full transition"><i className="fa-brands fa-whatsapp"></i></a>
                            </div>

                            <div className="w-full border-t border-gray-100 mt-10 pt-10 text-left">
                                <h3 className="text-xl font-bold text-gray-900 mb-4 border-l-4 border-primary pl-3">Tentang Saya</h3>
                                <p className="text-gray-700 leading-relaxed whitespace-pre-wrap">{profile.bio}</p>
                                
                                <h3 className="text-xl font-bold text-gray-900 mb-4 border-l-4 border-primary pl-3 mt-8">Keahlian (Skills)</h3>
                                <div className="flex flex-wrap gap-2">
                                    {profile.skills.split(',').map((skill, index) => (
                                        <span key={index} className="bg-indigo-50 text-indigo-700 border border-indigo-100 px-3 py-1 rounded-full text-sm font-medium">
                                            {skill.trim()}
                                        </span>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- TAMPILAN ADMIN: DASHBOARD & EDITOR ---
        function AdminDashboard({ products, profile, onSaveProfile, onSaveProduct, onDeleteProduct, onLogout, triggerAlert }) {
            const [activeTab, setActiveTab] = useState('products'); 
            const [editingProduct, setEditingProduct] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            
            // Local state untuk Profil (Menghindari simpan setiap ketik keyboard)
            const [localProfile, setLocalProfile] = useState(profile);
            
            // Sinkronisasi jika profil Cloud berubah
            useEffect(() => {
                setLocalProfile(profile);
            }, [profile]);

            // Handlers Profil
            const handleProfileChange = (e) => {
                const { name, value } = e.target;
                setLocalProfile(prev => ({ ...prev, [name]: value }));
            };

            const submitProfileToCloud = async () => {
                setIsSaving(true);
                await onSaveProfile(localProfile);
                setIsSaving(false);
                triggerAlert("Data profil Anda telah berhasil disimpan secara permanen di Cloud!");
            };

            // Handlers Produk
            const handleAddNew = () => {
                setEditingProduct({
                    id: Date.now(),
                    title: "Aplikasi Baru",
                    description: "Deskripsi aplikasi web Anda disini.",
                    price: "50000",
                    code: `<!DOCTYPE html>\n<html>\n<head>\n  <title>Aplikasi Baru</title>\n  <style>body { font-family: sans-serif; text-align: center; padding-top: 50px; }</style>\n</head>\n<body>\n  <h1>Halo Dunia</h1>\n  <p>Silahkan edit HTML ini.</p>\n</body>\n</html>`
                });
            };

            const handleSaveProduct = async () => {
                setIsSaving(true);
                await onSaveProduct(editingProduct);
                setEditingProduct(null);
                setIsSaving(false);
                triggerAlert("Produk berhasil diunggah dan disimpan ke Cloud Database!");
            };

            const handleDeleteProduct = (id) => {
                triggerAlert(
                    "Apakah Anda yakin ingin menghapus produk ini secara permanen dari Cloud?",
                    true, // Mode Konfirmasi
                    async () => {
                        await onDeleteProduct(id);
                    }
                );
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                    {/* Header Admin */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 bg-dark text-white p-4 rounded-xl shadow-lg">
                        <div className="flex items-center mb-4 md:mb-0">
                            <i className="fa-solid fa-gear text-2xl mr-3 text-primary"></i>
                            <div>
                                <h2 className="text-xl font-bold">Panel Administrasi (Cloud)</h2>
                                <p className="text-xs text-green-400"><i className="fa-solid fa-wifi mr-1"></i> Data tersimpan permanen di Firebase</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setActiveTab('products')} className={`px-4 py-2 rounded-lg text-sm font-medium ${activeTab === 'products' ? 'bg-primary' : 'bg-gray-700 hover:bg-gray-600'}`}>
                                Kelola Produk
                            </button>
                            <button onClick={() => setActiveTab('profile')} className={`px-4 py-2 rounded-lg text-sm font-medium ${activeTab === 'profile' ? 'bg-primary' : 'bg-gray-700 hover:bg-gray-600'}`}>
                                Kelola Profil
                            </button>
                            <button onClick={onLogout} className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-medium ml-2">
                                <i className="fa-solid fa-right-from-bracket"></i> Keluar
                            </button>
                        </div>
                    </div>

                    {/* Konten Tab Profil */}
                    {activeTab === 'profile' && !editingProduct && (
                        <div className="bg-white p-6 md:p-8 rounded-xl shadow-md border border-gray-100 relative animate-fadeIn">
                            <div className="flex justify-between items-center mb-6 border-b pb-2">
                                <h3 className="text-xl font-bold"><i className="fa-solid fa-user-pen mr-2"></i> Edit Data CV / Profil</h3>
                                <button 
                                    onClick={submitProfileToCloud} 
                                    disabled={isSaving}
                                    className="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-medium shadow disabled:opacity-50 transition"
                                >
                                    {isSaving ? <><i className="fa-solid fa-spinner fa-spin mr-2"></i>Menyimpan...</> : <><i className="fa-solid fa-cloud-arrow-up mr-2"></i>Simpan ke Cloud</>}
                                </button>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                                    <input type="text" name="name" value={localProfile.name} onChange={handleProfileChange} className="w-full p-2 border rounded focus:ring-2 focus:ring-primary focus:outline-none" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Pekerjaan / Titel</label>
                                    <input type="text" name="title" value={localProfile.title} onChange={handleProfileChange} className="w-full p-2 border rounded focus:ring-2 focus:ring-primary focus:outline-none" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                    <input type="email" name="email" value={localProfile.email} onChange={handleProfileChange} className="w-full p-2 border rounded focus:ring-2 focus:ring-primary focus:outline-none" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">No WhatsApp (Gunakan 62...)</label>
                                    <input type="text" name="waNumber" value={localProfile.waNumber} onChange={handleProfileChange} className="w-full p-2 border rounded focus:ring-2 focus:ring-primary focus:outline-none" />
                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Keahlian (Pisahkan dengan koma)</label>
                                    <input type="text" name="skills" value={localProfile.skills} onChange={handleProfileChange} className="w-full p-2 border rounded focus:ring-2 focus:ring-primary focus:outline-none" />
                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Bio / Tentang Saya</label>
                                    <textarea name="bio" value={localProfile.bio} onChange={handleProfileChange} rows="4" className="w-full p-2 border rounded focus:ring-2 focus:ring-primary focus:outline-none"></textarea>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Konten Tab Produk (List) */}
                    {activeTab === 'products' && !editingProduct && (
                        <div className="animate-fadeIn">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-xl font-bold"><i className="fa-solid fa-layer-group mr-2"></i> Daftar Aplikasi HTML</h3>
                                <button onClick={handleAddNew} className="bg-secondary hover:bg-green-600 text-white px-4 py-2 rounded-lg shadow font-medium transition">
                                    <i className="fa-solid fa-plus mr-1"></i> Tambah Baru
                                </button>
                            </div>
                            
                            <div className="bg-white rounded-xl shadow border border-gray-100 overflow-hidden">
                                {products.length === 0 ? (
                                    <div className="p-8 text-center text-gray-500">Belum ada aplikasi di Cloud. Silakan tambah baru.</div>
                                ) : (
                                    <ul className="divide-y divide-gray-200">
                                        {products.map(p => (
                                            <li key={p.id} className="p-4 hover:bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition">
                                                <div>
                                                    <h4 className="font-bold text-gray-900">{p.title}</h4>
                                                    <p className="text-sm text-gray-500 truncate max-w-md">{p.description}</p>
                                                    <p className="text-sm font-medium text-secondary mt-1">Rp {p.price}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setEditingProduct(p)} className="px-3 py-1 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 rounded text-sm font-medium transition">
                                                        <i className="fa-solid fa-pen-to-square mr-1"></i> Edit & Kode
                                                    </button>
                                                    <button onClick={() => handleDeleteProduct(p.id)} className="px-3 py-1 bg-red-100 text-red-700 hover:bg-red-200 rounded text-sm font-medium transition">
                                                        <i className="fa-solid fa-trash"></i>
                                                    </button>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Editor Produk HTML (Split Screen) */}
                    {editingProduct && (
                        <div className="bg-white rounded-xl shadow-xl border border-gray-200 flex flex-col h-[85vh] animate-fadeIn">
                            <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
                                <h3 className="font-bold text-lg"><i className="fa-solid fa-code mr-2"></i> HTML Editor: {editingProduct.title}</h3>
                                <div className="flex gap-2">
                                    <button onClick={() => setEditingProduct(null)} className="px-4 py-2 border border-gray-300 rounded text-gray-600 hover:bg-gray-100 font-medium">Batal</button>
                                    <button onClick={handleSaveProduct} disabled={isSaving} className="px-4 py-2 bg-primary hover:bg-indigo-700 text-white rounded shadow font-medium disabled:opacity-50 transition">
                                        {isSaving ? <><i className="fa-solid fa-spinner fa-spin mr-1"></i> Menyimpan...</> : <><i className="fa-solid fa-cloud-arrow-up mr-1"></i> Simpan ke Cloud</>}
                                    </button>
                                </div>
                            </div>
                            
                            {/* Editor Area (Responsive Layout) */}
                            <div className="flex-grow flex flex-col lg:flex-row overflow-hidden">
                                {/* Kiri: Pengaturan & Editor Kode */}
                                <div className="w-full lg:w-1/2 flex flex-col border-r border-gray-200 h-full">
                                    {/* Form Info Produk */}
                                    <div className="p-4 border-b bg-white space-y-3 shrink-0">
                                        <input 
                                            type="text" placeholder="Judul Aplikasi" 
                                            value={editingProduct.title} 
                                            onChange={(e) => setEditingProduct({...editingProduct, title: e.target.value})}
                                            className="w-full p-2 border rounded font-bold"
                                        />
                                        <div className="flex gap-3">
                                            <input 
                                                type="number" placeholder="Harga (Misal: 50000)" 
                                                value={editingProduct.price} 
                                                onChange={(e) => setEditingProduct({...editingProduct, price: e.target.value})}
                                                className="w-1/3 p-2 border rounded text-sm"
                                            />
                                            <input 
                                                type="text" placeholder="Deskripsi Singkat" 
                                                value={editingProduct.description} 
                                                onChange={(e) => setEditingProduct({...editingProduct, description: e.target.value})}
                                                className="w-2/3 p-2 border rounded text-sm"
                                            />
                                        </div>
                                    </div>
                                    {/* Area Teks HTML */}
                                    <div className="flex-grow flex flex-col relative bg-dark">
                                        <div className="bg-gray-800 text-gray-400 text-xs py-1 px-3 border-b border-gray-700 flex justify-between">
                                            <span>index.html (Paste kode aplikasi Anda di sini)</span>
                                        </div>
                                        <textarea 
                                            value={editingProduct.code}
                                            onChange={(e) => setEditingProduct({...editingProduct, code: e.target.value})}
                                            className="flex-grow w-full bg-[#1e1e1e] text-[#d4d4d4] font-mono p-4 focus:outline-none resize-none text-sm leading-relaxed"
                                            spellCheck="false"
                                        ></textarea>
                                    </div>
                                </div>
                                
                                {/* Kanan: Live Preview */}
                                <div className="w-full lg:w-1/2 h-[50vh] lg:h-full bg-white relative flex flex-col">
                                    <div className="bg-gray-100 text-gray-600 text-xs py-2 px-3 border-b flex justify-between items-center shadow-sm shrink-0">
                                        <span className="font-bold"><i className="fa-solid fa-eye mr-1"></i> Live Preview</span>
                                        <span className="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded">Auto Update</span>
                                    </div>
                                    <div className="flex-grow relative bg-white">
                                        <iframe 
                                            srcDoc={editingProduct.code} 
                                            className="absolute inset-0 w-full h-full border-0"
                                            sandbox="allow-scripts allow-same-origin allow-forms"
                                            title="Editor Preview"
                                        ></iframe>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- RENDER KE DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
