<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebStore & My Portofolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {

                        primary: '#4f46e5',

                        dark: '#1e293b'

                        scaleIn: 'scaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {

                            '100%': { opacity: '1', transform: 'translateY(0)' }

    <style>
        /* Custom scrollbar untuk editor */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c5c5c5; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .animate-fadeIn { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 1. CONFIG FIREBASE ANDA ---
        // Ganti null dengan config dari konsol Firebase Anda agar database cloud aktif secara permanen di Vercel:
        const MY_FIREBASE_CONFIG = {
              apiKey: "AIzaSyC7_kfqIm8OTzwqgnCzFSpfjYMETFtwDEU",
              authDomain: "difam-5c124.firebaseapp.com",
              projectId: "difam-5c124",
              storageBucket: "difam-5c124.firebasestorage.app",
              messagingSenderId: "41833181587",
              appId: "1:41833181587:web:6492096dd7e21ae581f866"
            };

        // --- DATA AWAL SEBAGAI FALLBACK (Jika Cloud Kosong / Offline) ---
        const initialProfile = {
            name: "Budi Developer",
            title: "Fullstack Web Developer",
            bio: "Saya adalah pengembang web independen yang berfokus pada pembuatan aplikasi web ringan, cepat, dan responsif (Single File HTML). Saya memiliki pengalaman lebih dari 5 tahun dalam dunia web development.",
            skills: "HTML, CSS, JavaScript, React, Tailwind",
            email: "di-fam.dev@example.com",
            waNumber: "6289695567267",
            avatar: "", // Akan diisi base64 hasil kompresi
            favicon: "", // Akan diisi base64 hasil kompresi
            socialLinks: [
                { id: "1", name: "Facebook", url: "https://facebook.com", icon: "fa-brands fa-facebook" },
                { id: "2", name: "Discord", url: "https://discord.com", icon: "fa-brands fa-discord" },
                { id: "3", name: "GitHub", url: "https://github.com", icon: "fa-brands fa-github" }
            ]
        };

        const sampleHtmlApp = `<!DOCTYPE html>
<html>
<head>
    <title>Demo App</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #e0f2fe; color: #0284c7; }
        button { padding: 10px 20px; background: #0ea5e9; color: white; border: none; border-radius: 5px; cursor: pointer;}
        button:hover { background: #0284c7; }
    </style>
</head>
<body>
    <h1>Aplikasi Kasir Sederhana (Demo)</h1>
    <p>Ini adalah contoh aplikasi web 1 file.</p>
    <button onclick="alert('Tombol ditekan!')">Coba Fitur</button>
</body>
</html>`;

        const initialProducts = [
            {
                id: Date.now(),
                title: "Aplikasi Kasir Mini HTML",
                description: "Aplikasi kasir ringan tanpa database, cocok untuk warung kecil. Sepenuhnya berjalan di browser.",
                price: "150000",
                code: sampleHtmlApp,
                thumbnail: "" // Base64 hasil kompresi
            }
        ];

        // --- UTILITAS: KOMPRESI GAMBAR (HEMAT STORAGE) ---
        const compressImage = (file, maxWidth, maxHeight, callback) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width *= maxHeight / height;
                            height = maxHeight;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // Gunakan kualitas 0.7 JPEG untuk ukuran dokumen database yang sangat efisien
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    callback(compressedDataUrl);
                };
            };
        };

        // --- KOMPONEN UTAMA ---
        function App() {
            // State Aplikasi
            const [view, setView] = useState('home'); 
            const [loading, setLoading] = useState(true);
            
            // State Cloud Database
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const [dbInitError, setDbInitError] = useState('');
            
            // State Data
            const [profile, setProfile] = useState(initialProfile);
            const [products, setProducts] = useState([]);
            const [activeProduct, setActiveProduct] = useState(null);

            // State Login Rahasia & Dialog Kustom
            const [claimCount, setClaimCount] = useState(0);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [adminEmail, setAdminEmail] = useState('');
            const [adminPassword, setAdminPassword] = useState('');
            const [loginStatus, setLoginStatus] = useState({ error: '', success: '' });
            const [customAlert, setCustomAlert] = useState(null); // { message, isConfirm, onConfirm }

            // Menentukan apakah user yang login saat ini adalah Admin asli
            const isOwner = user && !user.isAnonymous;

            // Trigger Dialog Kustom
            const triggerAlert = (message, isConfirm = false, onConfirm = null) => {
                setCustomAlert({ message, isConfirm, onConfirm });
            };

            // Inisialisasi Firebase & Autentikasi
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        let firebaseConfig = null;

                        // Gunakan config dari environment Canvas, jika tidak ada cari dari variabel lokal MY_FIREBASE_CONFIG
                        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                            firebaseConfig = JSON.parse(__firebase_config);
                        } else if (MY_FIREBASE_CONFIG && MY_FIREBASE_CONFIG.apiKey) {
                            firebaseConfig = MY_FIREBASE_CONFIG;
                        }

                        if (!firebaseConfig || !firebaseConfig.apiKey) {
                            throw new Error("Konfigurasi Firebase tidak ditemukan. Silakan tambahkan kredensial Firebase Anda ke variabel 'MY_FIREBASE_CONFIG' di baris ke-38.");
                        }

                        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
                        const { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, signOut } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
                        const { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');

                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        
                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        
                        setFb({ db, auth, appId, collection, doc, setDoc, deleteDoc, onSnapshot, signInWithEmailAndPassword, signOut });

                        // Autentikasi Publik Default (Anonymous)
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            onAuthStateChanged(auth, async (u) => {
                                if (!u) {
                                    try {
                                        await signInAnonymously(auth);
                                    } catch (anonError) {
                                        console.error("Anonymous Auth Error:", anonError);
                                        setDbInitError("Penting: Metode Sign-in 'Anonymous' (Anonim) belum diaktifkan di Firebase Console Anda.");
                                        setLoading(false);
                                    }
                                } else {
                                    setUser(u);
                                }
                            });
                        }
                    } catch (err) {
                        console.error("Firebase init error:", err);
                        setDbInitError(err.message);
                        setLoading(false); // Mode offline aman
                    }
                };
                initFirebase();

                // Timeout darurat jika loading terus lebih dari 8 detik
                const emergencyTimeout = setTimeout(() => {
                    setLoading(prev => {
                        if (prev) {
                            setDbInitError("Koneksi ke database terputus atau pengaturan Firebase belum lengkap.");
                            return false;
                        }
                        return prev;
                    });
                }, 8000);

                return () => clearTimeout(emergencyTimeout);
            }, []);

            // Ambil Data dari Firestore secara Realtime
            useEffect(() => {
                if (!user || !fb) {
                    if (dbInitError) {
                        setProducts(initialProducts);
                        setLoading(false);
                    }
                    return;
                }
                const { db, appId, collection, doc, setDoc, onSnapshot } = fb;

                let profileReady = false;
                let productsReady = false;

                const checkReady = () => {
                    if(profileReady && productsReady) setLoading(false);
                }

                // Listener Profil
                const unsubProfile = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'profileData'),
                    (snapshot) => {
                        if (snapshot.empty) {
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profileData', 'main'), initialProfile);
                        } else {
                            setProfile(snapshot.docs[0].data());
                        }
                        profileReady = true; checkReady();
                    },
                    (error) => { 
                        console.error("Profile sync error:", error); 
                        setDbInitError("Gagal membaca profil. Pastikan Aturan Keamanan (Rules) Firestore sudah di-set ke 'allow read: if true;'.");
                        profileReady = true; checkReady(); 
                    }
                );

                // Listener Produk
                const unsubProducts = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'productsData'),
                    (snapshot) => {
                        if (snapshot.empty) {
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productsData', initialProducts[0].id.toString()), initialProducts[0]);
                        } else {
                            const prods = [];
                            snapshot.forEach(d => prods.push(d.data()));
                            setProducts(prods);
                        }
                        productsReady = true; checkReady();
                    },
                    (error) => { 
                        console.error("Products sync error:", error); 
                        setDbInitError("Gagal membaca produk. Pastikan Aturan Keamanan (Rules) Firestore sudah diatur.");
                        productsReady = true; checkReady(); 
                    }
                );

                return () => {
                    unsubProfile();
                    unsubProducts();
                };
            }, [user, fb, dbInitError]);

            // Efek untuk update favicon dinamis
            useEffect(() => {
                if (profile && profile.favicon) {
                    let link = document.querySelector("link[rel~='icon']");
                    if (!link) {
                        link = document.createElement('link');
                        link.rel = 'icon';
                        document.getElementsByTagName('head')[0].appendChild(link);
                    }
                    link.href = profile.favicon;
                }
            }, [profile]);

            // Handler Simpan Profil
            const saveProfileToCloud = async (newProfile) => {
                if(!fb) return;
                const { db, appId, doc, setDoc } = fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profileData', 'main'), newProfile);
            };

            // Handler Simpan Produk
            const saveProductToCloud = async (prod) => {
                if(!fb) return;
                const { db, appId, doc, setDoc } = fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productsData', prod.id.toString()), prod);
            };

            // Handler Hapus Produk
            const deleteProductFromCloud = async (prodId) => {
                if(!fb) return;
                const { db, appId, doc, deleteDoc } = fb;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productsData', prodId.toString()));
            };

            // Handler login Admin dengan Email & Password resmi Firebase Auth
            const handleAdminLogin = async (e) => {
                e.preventDefault();
                setLoginStatus({ error: '', success: '' });
                
                try {
                    if (dbInitError && dbInitError.includes("Konfigurasi")) {
                        throw new Error(`Database tidak terhubung:\n${dbInitError}`);
                    }
                    if (!fb) {
                        throw new Error("Layanan Firebase sedang dimuat, harap tunggu.");
                    }
                    
                    const { auth, signInWithEmailAndPassword } = fb;
                    await signInWithEmailAndPassword(auth, adminEmail, adminPassword);
                    
                    setLoginStatus({ error: '', success: 'Sign In Berhasil! Selamat datang kembali Admin.' });
                    setTimeout(() => {
                        setShowLoginModal(false);
                        setClaimCount(0);
                        setAdminEmail('');
                        setAdminPassword('');
                        setLoginStatus({ error: '', success: '' });
                        setView('admin');
                    }, 1500);
                } catch (err) {
                    setLoginStatus({ error: err.message.replace("Firebase: ", ""), success: '' });
                }
            };

            // Handler Logout Admin
            const handleAdminLogout = async () => {
                if (!fb) return;
                const { auth, signOut } = fb;
                await signOut(auth);
                setView('home');
                triggerAlert("Anda telah keluar dari mode administrasi secara aman.");
            };

            // Klik Rahasia di Footer (5 kali klik untuk login)
            const handleSecretClick = () => {
                const nextCount = claimCount + 1;
                setClaimCount(nextCount);
                if (nextCount >= 5) {
                    setShowLoginModal(true);
                    setClaimCount(0);
                }
            };

            // Navigasi halaman
            const navigate = (page, product = null) => {
                setView(page);
                if (product) setActiveProduct(product);
            };

            // Format Rupiah
            const formatRupiah = (angka) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(angka);
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50">
                        <div className="text-center p-6">
                            <i className="fa-solid fa-cloud-arrow-down fa-bounce text-5xl text-primary mb-4"></i>
                            <h2 className="text-xl font-bold text-gray-700">Menyinkronkan Data Cloud...</h2>
                            <p className="text-sm text-gray-500 mt-2">Menghubungkan ke server cloud aman</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* BANNER NOTIFIKASI ERROR/DEMO */}
                    {dbInitError && (
                        <div className="bg-red-500 text-white text-xs py-2 px-4 text-center font-semibold flex items-center justify-center gap-2">
                            <i className="fa-solid fa-triangle-exclamation"></i>
                            <span>Mode Offline Aktif: {dbInitError.includes("Konfigurasi Firebase tidak ditemukan") ? "Masukkan Firebase Config Anda di variabel 'MY_FIREBASE_CONFIG'." : dbInitError}</span>
                        </div>
                    )}

                    {/* NAVBAR */}
                    <nav className="bg-white shadow-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16">
                                <div className="flex items-center">
                                    <span className="text-xl font-bold text-primary cursor-pointer flex items-center" onClick={() => navigate('home')}>
                                        {profile.favicon ? (
                                            <img src={profile.favicon} alt="Favicon" className="w-8 h-8 rounded-md mr-2 object-cover border border-indigo-100" />
                                        ) : (
                                            <i className="fa-solid fa-code border-2 border-primary rounded-md p-1 mr-2"></i>
                                        )}
                                        {profile.name} <span className="hidden sm:inline-block ml-1 text-gray-500 text-sm font-normal">Store</span>
                                    </span>
                                </div>
                                <div className="flex items-center space-x-2 md:space-x-4">
                                    <button onClick={() => navigate('home')} className={`px-3 py-2 rounded-md text-sm font-medium transition ${view === 'home' ? 'text-primary bg-indigo-50' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}`}>
                                        <i className="fa-solid fa-store md:mr-2"></i><span className="hidden md:inline">Produk</span>
                                    </button>
                                    <button onClick={() => navigate('cv')} className={`px-3 py-2 rounded-md text-sm font-medium transition ${view === 'cv' ? 'text-primary bg-indigo-50' : 'text-gray-600 hover:text-primary hover:bg-gray-50'}`}>
                                        <i className="fa-solid fa-user-tie md:mr-2"></i><span className="hidden md:inline">Profil CV</span>
                                    </button>
                                    
                                    {/* HANYA TAMPIL JIKA LOGIN SEBAGAI ADMIN RESMI */}
                                    {isOwner && (
                                        <button onClick={() => navigate('admin')} className={`px-3 py-2 rounded-md text-sm font-medium transition ${view === 'admin' ? 'bg-dark text-white' : 'text-gray-600 hover:text-dark hover:bg-gray-100'}`}>
                                            <i className="fa-solid fa-user-shield md:mr-2 text-green-400 animate-pulse"></i><span className="hidden md:inline">Panel Admin</span>
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* AREA KONTEN UTAMA DENGAN ANIMASI FADE-IN */}
                    <main className="flex-grow">
                        {view === 'home' && (
                            <div className="animate-fadeIn">
                                <PublicHome products={products} onSelectProduct={(p) => navigate('productDetail', p)} formatRupiah={formatRupiah} />
                            </div>
                        )}
                        {view === 'cv' && (
                            <div className="animate-fadeIn">
                                <ProfileView profile={profile} />
                            </div>
                        )}
                        {view === 'productDetail' && (
                            <div className="animate-fadeIn">
                                <ProductDetail product={activeProduct} onBack={() => navigate('home')} waNumber={profile.waNumber} formatRupiah={formatRupiah} />
                            </div>
                        )}
                        
                        {/* Panel Admin */}
                        {view === 'admin' && isOwner && (
                            <div className="animate-fadeIn">
                                <AdminDashboard 
                                    products={products} 
                                    profile={profile} 
                                    onSaveProfile={saveProfileToCloud}
                                    onSaveProduct={saveProductToCloud}
                                    onDeleteProduct={deleteProductFromCloud}
                                    onLogout={handleAdminLogout}
                                    triggerAlert={triggerAlert}
                                />
                            </div>
                        )}
                        
                        {/* Proteksi jika diakses secara paksa */}
                        {view === 'admin' && !isOwner && (
                            <div className="text-center py-20 text-red-500 font-bold text-xl animate-fadeIn">
                                <i className="fa-solid fa-circle-xmark text-5xl mb-3 block"></i>
                                Akses Ditolak. Silakan Sign In sebagai Admin melalui pintu masuk rahasia.
                            </div>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-dark text-white text-center py-6 mt-auto">
                        <p>&copy; {new Date().getFullYear()} {profile.name}. Hak Cipta Dilindungi.</p>
                        <p className="text-gray-400 text-sm mt-2 flex justify-center items-center gap-2">
                            <span>Dibuat sebagai Single-File HTML WebApp</span>
                            <span>•</span>
                            <span 
                                onClick={handleSecretClick} 
                                className={`cursor-pointer hover:underline select-none flex items-center gap-1 ${dbInitError ? 'text-red-400' : 'text-green-400'}`}
                                title="Ketuk 5 kali untuk masuk Admin"
                            >
                                <i className={`fa-solid ${dbInitError ? 'fa-cloud-slash' : 'fa-cloud'}`}></i> {dbInitError ? 'Offline Mode Active' : 'Cloud Sync Active'}
                            </span>
                        </p>
                    </footer>

                    {/* --- MODAL DIALOG KUSTOM --- */}
                    {customAlert && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black bg-opacity-50 animate-fadeIn">
                            <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full border border-gray-100">
                                <h3 className="text-lg font-bold text-gray-900 mb-3 flex items-center">
                                    <i className="fa-solid fa-circle-info text-primary mr-2 text-xl"></i> Informasi
                                </h3>
                                <p className="text-gray-600 text-sm mb-6 whitespace-pre-line">{customAlert.message}</p>
                                <div className="flex justify-end gap-3">
                                    {customAlert.isConfirm && (
                                        <button 
                                            onClick={() => { customAlert.onConfirm && customAlert.onConfirm(); setCustomAlert(null); }}
                                            className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-semibold transition"
                                        >
                                            Ya, Lanjutkan
                                        </button>
                                    )}
                                    <button 
                                        onClick={() => setCustomAlert(null)}
                                        className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-semibold transition"
                                    >
                                        {customAlert.isConfirm ? 'Batal' : 'Tutup'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL SIGN IN ADMIN SECARA SECURE (EMAIL & PASSWORD) --- */}
                    {showLoginModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-70 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white rounded-2xl p-6 max-w-md w-full border border-gray-100 shadow-2xl">
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-indigo-50 text-primary rounded-full flex items-center justify-center mx-auto mb-4">
                                        <i className="fa-solid fa-user-shield text-3xl"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-gray-950">Secure Admin Sign In</h3>
                                    <p className="text-sm text-gray-500 mt-1">Gunakan Email dan Password Admin Anda yang telah didaftarkan di Firebase console.</p>
                                </div>
                                
                                <form onSubmit={handleAdminLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold uppercase text-gray-500 mb-1">Email Admin</label>
                                        <input 
                                            type="email"
                                            placeholder="admin@email.com"
                                            className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none"
                                            value={adminEmail}
                                            onChange={(e) => setAdminEmail(e.target.value)}
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase text-gray-500 mb-1">Password</label>
                                        <input 
                                            type="password"
                                            placeholder="••••••••"
                                            className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:outline-none"
                                            value={adminPassword}
                                            onChange={(e) => setAdminPassword(e.target.value)}
                                            required
                                        />
                                    </div>

                                    {loginStatus.error && (
                                        <div className="text-red-500 text-xs font-medium bg-red-50 p-3 rounded-lg border border-red-200 text-left space-y-1">
                                            <p className="font-bold"><i className="fa-solid fa-circle-exclamation mr-1"></i> Gagal Sign In:</p>
                                            <p className="whitespace-pre-line text-[11px] leading-relaxed">{loginStatus.error}</p>
                                        </div>
                                    )}
                                    {loginStatus.success && (

        // --- TAMPILAN ADMIN: DASHBOARD & EDITOR (Lengkap dengan Unggah Foto, Favicon, Sosmed) ---
        function AdminDashboard({ products, profile, onSaveProfile, onSaveProduct, onDeleteProduct, onLogout, triggerAlert }) {
            const [activeTab, setActiveTab] = useState('products'); 
            const [editingProduct, setEditingProduct] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            
            // Local state untuk Profil (Menghindari simpan setiap ketik keyboard)
            const [localProfile, setLocalProfile] = useState(profile);
            
            // Sosmed form temp state
            const [newLinkName, setNewLinkName] = useState('');
            const [newLinkUrl, setNewLinkUrl] = useState('');
            const [newLinkIcon, setNewLinkIcon] = useState('fa-solid fa-link');

            useEffect(() => {
                setLocalProfile(profile);
            }, [profile]);

            // Handlers Profil Teks
            const handleProfileChange = (e) => {
                const { name, value } = e.target;
                setLocalProfile(prev => ({ ...prev, [name]: value }));
            };

            // Handler Unggah & Kompres Foto Profil
            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                compressImage(file, 300, 300, (base64) => {
                    setLocalProfile(prev => ({ ...prev, avatar: base64 }));
                });
            };

            // Handler Unggah & Kompres Favicon Web
            const handleFaviconUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                compressImage(file, 64, 64, (base64) => {
                    setLocalProfile(prev => ({ ...prev, favicon: base64 }));
                });
            };

            // Handler Tambah Link Sosial Media
            const handleAddSocialLink = () => {
                if(!newLinkName || !newLinkUrl) {
                    triggerAlert("Nama Link dan URL wajib diisi!");
                    return;
                }
                const newLink = {
                    id: Date.now().toString(),
                    name: newLinkName,
                    url: newLinkUrl,
                    icon: newLinkIcon
                };
                setLocalProfile(prev => ({
                    ...prev,
                    socialLinks: [...(prev.socialLinks || []), newLink]
                }));
                setNewLinkName('');
                setNewLinkUrl('');
                setNewLinkIcon('fa-solid fa-link');
            };

            // Handler Hapus Link Sosial Media
            const handleRemoveSocialLink = (id) => {
                setLocalProfile(prev => ({
                    ...prev,
                    socialLinks: prev.socialLinks.filter(link => link.id !== id)
                }));
            };

            const submitProfileToCloud = async () => {
                setIsSaving(true);
                await onSaveProfile(localProfile);
                setIsSaving(false);
                triggerAlert("Data profil, foto, dan tautan kustom Anda telah tersimpan secara permanen!");
            };

            // Handlers Produk & Thumbnail
            const handleAddNew = () => {
                setEditingProduct({
                    id: Date.now(),
                    title: "Aplikasi Baru",
                    description: "Deskripsi aplikasi web Anda disini.",
                    price: "50000",
                    code: `<!DOCTYPE html>\n<html>\n<head>\n  <title>Aplikasi Baru</title>\n  <style>body { font-family: sans-serif; text-align: center; padding-top: 50px; }</style>\n</head>\n<body>\n  <h1>Halo Dunia</h1>\n  <p>Silahkan edit HTML ini.</p>\n</body>\n</html>`,
                    thumbnail: ""
                });
            };

            const handleThumbnailUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                compressImage(file, 400, 300, (base64) => {
                    setEditingProduct(prev => ({ ...prev, thumbnail: base64 }));
                });
            };

            const handleSaveProduct = async () => {
                setIsSaving(true);
                await onSaveProduct(editingProduct);
                setEditingProduct(null);
                setIsSaving(false);
                triggerAlert("Produk dan Thumbnail berhasil diunggah ke Cloud Database!");
            };

            const handleDeleteProduct = (id) => {
                triggerAlert(
                    "Apakah Anda yakin ingin menghapus produk ini secara permanen dari Cloud?",
                    true, 
                    async () => {
                        await onDeleteProduct(id);
                    }
                );
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 bg-dark text-white p-4 rounded-xl shadow-lg">

                            <i className="fa-solid fa-user-shield text-2xl mr-3 text-primary"></i>
                            <div>
                                <h2 className="text-xl font-bold">Panel Administrasi (Cloud)</h2>
                                <p className="text-xs text-green-400"><i className="fa-solid fa-lock-open mr-1"></i> Terhubung secara aman sebagai Pengelola Resmi</p>
                            </div>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            <button onClick={() => { setActiveTab('products'); setEditingProduct(null); }} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${activeTab === 'products' ? 'bg-primary' : 'bg-gray-700 hover:bg-gray-600'}`}>
                                Kelola Produk
                            </button>
                            <button onClick={() => { setActiveTab('profile'); setEditingProduct(null); }} className={`px-4 py-2 rounded-lg text-sm font-medium transition ${activeTab === 'profile' ? 'bg-primary' : 'bg-gray-700 hover:bg-gray-600'}`}>
                                Kelola Profil & Sosmed
                            </button>
                            <button onClick={onLogout} className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-medium ml-2 transition">
                                <i className="fa-solid fa-right-from-bracket"></i> Keluar
                            </button>
                        </div>

                    {/* Konten Tab Profil */}

                                <button 
                                    onClick={submitProfileToCloud} 
                                    disabled={isSaving}
                                    className="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-medium shadow disabled:opacity-50 transition flex items-center gap-1"
                                >
                                    {isSaving ? <><i className="fa-solid fa-spinner fa-spin"></i> Menyimpan...</> : <><i className="fa-solid fa-cloud-arrow-up"></i> Simpan ke Cloud</>}
                                </button>

                            {/* Baris Atas: Unggah Foto (Profil & Favicon) */}

                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">No WhatsApp (Gunakan 62...)</label>
                                    <input type="text" name="waNumber" value={localProfile.waNumber} onChange={handleProfileChange} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none text-sm" />
                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Keahlian (Pisahkan dengan koma)</label>
                                    <input type="text" name="skills" value={localProfile.skills} onChange={handleProfileChange} className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none text-sm" />
                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">Bio / Tentang Saya</label>
                                    <textarea name="bio" value={localProfile.bio} onChange={handleProfileChange} rows="4" className="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none text-sm"></textarea>
                                </div>
                            </div>

                            {/* Baris Bawah: Pengelola Tautan Kustom (Social Links) */}
                            <div className="border-t pt-8">
                                <h4 className="text-md font-bold text-gray-900 mb-4 flex items-center gap-2"><i className="fa-solid fa-link text-primary"></i> Kelola Tautan Kustom (Sosmed/Portofolio)</h4>
                                
                                {/* Form tambah link */}
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nama Tautan</label>
                                        <input type="text" placeholder="Misal: Facebook, Discord, LinkedIn" value={newLinkName} onChange={(e) => setNewLinkName(e.target.value)} className="w-full p-2 border rounded-lg text-xs" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Alamat URL Tautan</label>
                                        <input type="url" placeholder="https://example.com/username" value={newLinkUrl} onChange={(e) => setNewLinkUrl(e.target.value)} className="w-full p-2 border rounded-lg text-xs" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Pilih Jenis Ikon</label>
                                        <select value={newLinkIcon} onChange={(e) => setNewLinkIcon(e.target.value)} className="w-full p-2 border rounded-lg text-xs">
                                            <option value="fa-solid fa-link">Default Link (Ikon Rantai)</option>
                                            <option value="fa-brands fa-facebook">Facebook</option>
                                            <option value="fa-brands fa-discord">Discord</option>
                                            <option value="fa-brands fa-github">GitHub</option>
                                            <option value="fa-brands fa-linkedin">LinkedIn</option>
                                            <option value="fa-solid fa-briefcase">Freelancer / Portofolio</option>
                                            <option value="fa-brands fa-instagram">Instagram</option>
                                            <option value="fa-brands fa-telegram">Telegram</option>
                                        </select>
                                    </div>
                                    <div className="sm:col-span-3 flex justify-end">
                                        <button type="button" onClick={handleAddSocialLink} className="bg-primary hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-lg text-xs transition">
                                            <i className="fa-solid fa-plus mr-1"></i> Tambahkan Link
                                        </button>
                                    </div>
                                </div>

                                {/* List link aktif */}
                                <div className="space-y-2">
                                    {(!localProfile.socialLinks || localProfile.socialLinks.length === 0) ? (
                                        <p className="text-xs text-gray-400 italic">Belum ada tautan sosial yang ditambahkan.</p>
                                    ) : (
                                        localProfile.socialLinks.map((link) => (
                                            <div key={link.id} className="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 hover:shadow-sm transition">
                                                <div className="flex items-center gap-3 text-sm">
                                                    <span className="w-8 h-8 rounded-lg bg-indigo-50 text-primary flex items-center justify-center"><i className={link.icon}></i></span>
                                                    <div>
                                                        <span className="font-bold text-gray-800 mr-2">{link.name}</span>
                                                        <span className="text-xs text-gray-400 font-mono hidden sm:inline-block">{link.url}</span>
                                                    </div>
                                                </div>
                                                <button onClick={() => handleRemoveSocialLink(link.id)} className="text-red-500 hover:text-red-700 text-xs font-bold px-3 py-1 bg-red-50 rounded-lg transition">Hapus</button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Konten Tab Produk (List) */}
                    {activeTab === 'products' && !editingProduct && (
                        <div className="animate-fadeIn">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-xl font-bold"><i className="fa-solid fa-layer-group mr-2"></i> Daftar Aplikasi HTML</h3>
                                <button onClick={handleAddNew} className="bg-secondary hover:bg-green-600 text-white px-4 py-2 rounded-lg shadow font-semibold transition">
                                    <i className="fa-solid fa-plus mr-1"></i> Tambah Baru
                                </button>
                            </div>
                            
                            <div className="bg-white rounded-xl shadow border border-gray-100 overflow-hidden">
                                {products.length === 0 ? (
                                    <div className="p-8 text-center text-gray-500">Belum ada aplikasi di Cloud. Silakan tambah baru.</div>
                                ) : (
                                    <ul className="divide-y divide-gray-200">
                                        {products.map(p => (
                                            <li key={p.id} className="p-4 hover:bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-16 h-12 rounded bg-gray-100 border overflow-hidden flex items-center justify-center shrink-0">
                                                        {p.thumbnail ? (
                                                            <img src={p.thumbnail} alt={p.title} className="w-full h-full object-cover" />
                                                        ) : (
                                                            <i className="fa-solid fa-laptop-code text-gray-400"></i>
                                                        )}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-gray-900">{p.title}</h4>
                                                        <p className="text-sm text-gray-500 truncate max-w-[200px] xs:max-w-xs md:max-w-md">{p.description}</p>
                                                        <p className="text-sm font-medium text-secondary mt-1">Rp {p.price}</p>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setEditingProduct(p)} className="px-3 py-1 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 rounded-lg text-sm font-semibold transition">
                                                        <i className="fa-solid fa-pen-to-square mr-1"></i> Edit & Kode
                                                    </button>
                                                    <button onClick={() => handleDeleteProduct(p.id)} className="px-3 py-1 bg-red-100 text-red-700 hover:bg-red-200 rounded-lg text-sm font-semibold transition">
                                                        <i className="fa-solid fa-trash"></i>
                                                    </button>
                                                </div>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Editor Produk HTML dengan split screen */}
                    {editingProduct && (
                        <div className="bg-white rounded-xl shadow-xl border border-gray-200 flex flex-col h-[85vh] animate-fadeIn">
                            <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl shrink-0">
                                <h3 className="font-bold text-md sm:text-lg"><i className="fa-solid fa-code mr-2"></i> HTML Editor: {editingProduct.title}</h3>
                                <div className="flex gap-2">
                                    <button onClick={() => setEditingProduct(null)} className="px-3 sm:px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-100 text-xs sm:text-sm font-medium">Batal</button>
                                    <button onClick={handleSaveProduct} disabled={isSaving} className="px-3 sm:px-4 py-2 bg-primary hover:bg-indigo-700 text-white rounded-lg shadow text-xs sm:text-sm font-semibold disabled:opacity-50 transition">
                                        {isSaving ? <><i className="fa-solid fa-spinner fa-spin mr-1"></i> Menyimpan...</> : <><i className="fa-solid fa-cloud-arrow-up mr-1"></i> Simpan ke Cloud</>}
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex-grow flex flex-col lg:flex-row overflow-hidden">
                                {/* Editor Kiri */}
                                <div className="w-full lg:w-1/2 flex flex-col border-r border-gray-200 h-1/2 lg:h-full overflow-hidden">
                                    <div className="p-4 border-b bg-white space-y-3 shrink-0">
                                        <div className="flex flex-col sm:flex-row gap-4">
                                            {/* Form Thumbnail Produk */}
                                            <div className="flex items-center gap-3 bg-slate-50 p-2.5 rounded-xl border border-slate-150 shrink-0">
                                                <div className="w-14 h-10 bg-white border rounded overflow-hidden flex items-center justify-center">
                                                    {editingProduct.thumbnail ? (
                                                        <img src={editingProduct.thumbnail} alt="Thumb App" className="w-full h-full object-cover" />
                                                    ) : (
                                                        <i className="fa-solid fa-image text-gray-300"></i>
                                                    )}
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-bold text-gray-500 uppercase">Thumbnail App</label>
                                                    <input type="file" accept="image/*" onChange={handleThumbnailUpload} className="text-[10px] text-gray-500 file:mr-1 file:py-1 file:px-2 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-indigo-50 file:text-primary hover:file:bg-indigo-100 cursor-pointer w-28 overflow-hidden" />
                                                </div>
                                            </div>
                                            <input 
                                                type="text" placeholder="Judul Aplikasi" 
                                                value={editingProduct.title} 
                                                onChange={(e) => setEditingProduct({...editingProduct, title: e.target.value})}
                                                className="flex-grow p-2 border rounded-lg font-bold text-sm"
                                            />
                                        </div>
                                        <div className="flex gap-3">
                                            <input 
                                                type="number" placeholder="Harga (Misal: 150000)" 
                                                value={editingProduct.price} 
                                                onChange={(e) => setEditingProduct({...editingProduct, price: e.target.value})}
                                                className="w-1/3 p-2 border rounded-lg text-xs"
                                            />
                                            <input 
                                                type="text" placeholder="Deskripsi Singkat" 
                                                value={editingProduct.description} 
                                                onChange={(e) => setEditingProduct({...editingProduct, description: e.target.value})}
                                                className="w-2/3 p-2 border rounded-lg text-xs"
                                            />
                                        </div>
                                    </div>
                                    <div className="flex-grow flex flex-col relative bg-dark overflow-hidden">
                                        <div className="bg-gray-800 text-gray-400 text-[10px] py-1 px-3 border-b border-gray-700 flex justify-between shrink-0">
                                            <span>index.html (Paste kode aplikasi Anda di sini)</span>
                                        </div>
                                        <textarea 
                                            value={editingProduct.code}
                                            onChange={(e) => setEditingProduct({...editingProduct, code: e.target.value})}
                                            className="flex-grow w-full bg-[#1e1e1e] text-[#d4d4d4] font-mono p-4 focus:outline-none resize-none text-xs leading-relaxed overflow-y-auto"
                                            spellCheck="false"
                                        ></textarea>
                                    </div>
                                </div>
                                
                                {/* Preview Kanan */}
                                <div className="w-full lg:w-1/2 h-1/2 lg:h-full bg-white relative flex flex-col">
                                    <div className="bg-gray-100 text-gray-600 text-[10px] py-2 px-3 border-b flex justify-between items-center shadow-sm shrink-0">
                                        <span className="font-bold"><i className="fa-solid fa-eye mr-1"></i> Live Preview</span>
                                        <span className="text-[9px] bg-green-100 text-green-700 px-2 py-0.5 rounded font-bold">Auto Update</span>
                                    </div>
                                    <div className="flex-grow relative bg-white">
                                        <iframe 
                                            srcDoc={editingProduct.code} 
                                            className="absolute inset-0 w-full h-full border-0"
                                            sandbox="allow-scripts allow-same-origin allow-forms"
                                            title="Editor Live Preview"
                                        ></iframe>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- RENDER KE DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
